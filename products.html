<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZayFBS - Produits</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="products.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">
                <img src="images/logo.png" alt="logo"> ZayFBS
            </div>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="products.html">Produits</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="cart"><img src="images/⁫icon.png" alt="icon"></div>
        </nav>
    </header>

    <div class="container">
        <div class="products-section">
            <div class="section-header">
                <h2>Nos Produits</h2>
                <button class="add-product-btn">
                    <i class="fas fa-plus"></i> Ajouter un produit
                </button>
            </div>
            <div class="products-grid"></div>
        </div>

        <div class="cart-sidebar"></div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal-overlay">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal()">×</button>
            <h3 id="modalTitle">Ajouter un produit</h3>
            <div class="modal-field">
                <label>Nom du produit</label>
                <input type="text" id="mName" placeholder="Ex: ZaytFBS Premium">
            </div>
            <div class="modal-field">
                <label>Prix (DH)</label>
                <input type="number" id="mPrice" placeholder="Ex: 120" min="1">
            </div>
            <div class="modal-field">
                <label>Chemin image</label>
                <input type="text" id="mImage" placeholder="https://exemple.com/image.jpg">
            </div>
            <div class="modal-field">
                <label>Description</label>
                <textarea id="mDesc" rows="3" placeholder="Description du produit..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="modal-cancel" onclick="closeModal()">Annuler</button>
                <button class="modal-save" onclick="saveProduct()">Enregistrer</button>
            </div>
        </div>
    </div>

    <footer>
        <span>Fquih Ben Saleh - Maroc</span>
        <span>© 2026 ZayFBS - Tous droits réservés</span>
    </footer>

    <script src="script.js"></script>
</body>
</html>
